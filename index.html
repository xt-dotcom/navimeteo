<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Navimeteo</title>

  <style>
    :root{
      --text: #0b1f3a;
      --muted: #244a75;

      --glass: rgba(255,255,255,.28);
      --glass-hover: rgba(255,255,255,.38);
      --border: rgba(0,25,60,.12);

      --radius: 26px;
      --tile: 200px;
      --gap: 22px;
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; }

    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background: url("navimeteo.jpeg") no-repeat center center fixed;
      background-size: cover;
    }

    /* overlay très léger */
    body::before{
      content:"";
      position: fixed;
      inset:0;
      background: rgba(255,255,255,.03);
      z-index:-1;
    }

    .wrap{
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 28px;
    }

    h1{
      margin:0;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: .5px;
      color:#07182d;
    }

    .subtitle{
      margin-top: 6px;
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
    }

    .grid{
      margin-top: 40px;
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(var(--tile), 1fr));
      gap: var(--gap);
    }

    a.tile{
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:16px;
      padding:28px 22px;
      border-radius: var(--radius);

      /* Effet glass déplacé ici */
      background: var(--glass);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--border);

      text-decoration:none;
      color:inherit;
      transition: all .3s cubic-bezier(.2,.8,.2,1);
      box-shadow: 0 20px 50px rgba(0,0,0,.15);
    }

    a.tile:hover{
      transform: translateY(-8px) scale(1.04);
      background: var(--glass-hover);
      box-shadow: 0 30px 70px rgba(0,0,0,.22);
    }

    .row{
      display:flex;
      align-items:center;
      gap:18px;
    }

    .icon{
      width:72px;
      height:72px;
      border-radius:22px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:34px;
      background: rgba(11,31,58,.08);
      border: 1px solid rgba(11,31,58,.10);
    }

    .name{
      font-size:17px;
      font-weight:800;
      margin:0;
      color:#07182d;
    }

    .desc{
      margin:0;
      font-size:13px;
      font-weight:600;
      color: rgba(11,31,58,.75);
    }

    @media (max-width: 600px){
      :root{ --tile: 170px; }
      .wrap{ padding: 28px 20px; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Navimeteo</h1>
    <div class="subtitle">Météo • Windy • Marées • Port • Cartes</div>

    <div class="grid">

      <a class="tile" href="https://marine.meteoconsult.fr/meteo-marine/bulletin-detaille/port-311/previsions-meteo-saint-quay-port-d-armor-aujourdhui" target="_blank">
        <div class="row">
          <div class="icon">☁️</div>
          <div>
            <p class="name">Météo</p>
            <p class="desc">Bulletin détaillé</p>
          </div>
        </div>
      </a>

      <a class="tile" href="https://www.windy.com/fr/-Mes-favoris/favs?48.647,-2.823,5" target="_blank">
        <div class="row">
          <div class="icon">🌬️</div>
          <div>
            <p class="name">Windy</p>
            <p class="desc">Vent & prévisions</p>
          </div>
        </div>
      </a>

      <a class="tile" href="https://maree.info/59" target="_blank">
        <div class="row">
          <div class="icon">🌊</div>
          <div>
            <p class="name">Marées</p>
            <p class="desc">Horaires & coef</p>
          </div>
        </div>
      </a>

      <a class="tile" href="https://www.port-armor.com/" target="_blank">
        <div class="row">
          <div class="icon">⚓</div>
          <div>
            <p class="name">Port d’Armor</p>
            <p class="desc">Infos & services</p>
          </div>
        </div>
      </a>

      <a class="tile" href="https://maps.garmin.com/fr-FR/marine?maps=another-brand&overlay=false&key=gbtuzq7bxfzf" target="_blank">
        <div class="row">
          <div class="icon">🗺️</div>
          <div>
            <p class="name">Cartes</p>
            <p class="desc">Garmin Marine</p>
          </div>
        </div>
      </a>

    </div>
  </div>
</body>
</html>
