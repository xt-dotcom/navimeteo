<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bankinsurance</title>

  <style>
    :root{
      --text: #0b1f3a;
      --muted: #244a75;

      --glass: rgba(255,255,255,.28);
      --glass-hover: rgba(255,255,255,.38);
      --border: rgba(0,25,60,.12);

      --radius: 26px;
      --tile: 200px;
      --gap: 22px;
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; }

    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background: url("banques.jpg") no-repeat center center fixed;
      background-size: cover;
    }

    /* overlay très léger */
    body::before{
      content:"";
      position: fixed;
      inset:0;
      background: rgba(255,255,255,.03);
      z-index:-1;
    }

    .wrap{
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 28px;
    }

    h1{
      margin:0;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: .5px;
      color:#07182d;
    }

    .subtitle{
      margin-top: 6px;
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
    }

    .grid{
      margin-top: 40px;
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(var(--tile), 1fr));
      gap: var(--gap);
    }

    a.tile{
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:16px;
      padding:28px 22px;
      border-radius: var(--radius);

      /* Effet glass premium */
      background: var(--glass);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--border);

      text-decoration:none;
      color:inherit;
      transition: transform .30s cubic-bezier(.2,.8,.2,1),
                  background .30s ease,
                  box-shadow .30s ease;
      box-shadow: 0 20px 50px rgba(0,0,0,.15);
      -webkit-tap-highlight-color: transparent;
    }

    a.tile:hover{
      transform: translateY(-8px) scale(1.04);
      background: var(--glass-hover);
      box-shadow: 0 30px 70px rgba(0,0,0,.22);
    }

    .row{
      display:flex;
      align-items:center;
      gap:18px;
      min-width: 0;
    }

    /* Cadre de l'icône */
    .icon{
      width:72px;
      height:72px;
      border-radius:22px;
      display:flex;
      align-items:center;
      justify-content:center;

      background: rgba(11,31,58,.08);
      border: 1px solid rgba(11,31,58,.10);

      flex: 0 0 auto;
      overflow:hidden;
    }

    /* Image (PNG/JPG) */
    .icon img{
      width: 46px;
      height: 46px;
      object-fit: contain;
      display:block;
      filter: drop-shadow(0 6px 10px rgba(0,0,0,.12));
      transform: translateZ(0);
    }

    a.tile:hover .icon img{
      transform: scale(1.06);
      transition: transform .30s cubic-bezier(.2,.8,.2,1);
    }

    .name{
      font-size:17px;
      font-weight:800;
      margin:0;
      color:#07182d;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .desc{
      margin:0;
      font-size:13px;
      font-weight:600;
      color: rgba(11,31,58,.75);
      line-height: 1.25;
    }

    @media (max-width: 600px){
      :root{ --tile: 170px; }
      .wrap{ padding: 28px 20px; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Bankinsurance</h1>
    <div class="subtitle">Banques • Assurances • Accès client</div>

    <div class="grid">

      <a class="tile" href="https://mabanque.bnpparibas/fr/gerer/comptes-et-formules/gerer-ses-comptes" target="_blank" rel="noopener">
        <div class="row">
          <div class="icon">
            <img src="bnpparibas.png" alt="BNP Paribas">
          </div>
          <div>
            <p class="name">BNP</p>
            <p class="desc">Ma banque</p>
          </div>
        </div>
      </a>

      <a class="tile" href="https://www.banquepopulaire.fr/professionnels/" target="_blank" rel="noopener">
        <div class="row">
          <div class="icon">
            <img src="banquepopulaire.png" alt="Banque Populaire">
          </div>
          <div>
            <p class="name">Banque Populaire</p>
            <p class="desc">Espace pro</p>
          </div>
        </div>
      </a>

      <a class="tile" href="https://fortuneo.fr" target="_blank" rel="noopener">
        <div class="row">
          <div class="icon">
            <img src="fortuneo.png" alt="Fortuneo">
          </div>
          <div>
            <p class="name">Fortuneo</p>
            <p class="desc">Banque en ligne</p>
          </div>
        </div>
      </a>

      <a class="tile" href="https://www.matmut.fr/app/login/login?returnurl=https%3A%2F%2Fwww.matmut.fr%2Fapp%2FEspaceSocietaireInternet%2F%23%2Faccueil" target="_blank" rel="noopener">
        <div class="row">
          <div class="icon">
            <img src="matmut.png" alt="Matmut">
          </div>
          <div>
            <p class="name">Matmut</p>
            <p class="desc">Espace client</p>
          </div>
        </div>
      </a>

      <a class="tile" href="https://espace-client.allianz.fr/" target="_blank" rel="noopener">
        <div class="row">
          <div class="icon">
            <img src="allianz.png" alt="Allianz">
          </div>
          <div>
            <p class="name">Allianz</p>
            <p class="desc">Espace client</p>
          </div>
        </div>
      </a>

    </div>
  </div>
</body>
</html>
